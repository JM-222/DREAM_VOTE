<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#00b496">
<title>DREAM 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--t:#00b496;--t2:#008f78;--t3:#005f50;--lt:rgba(0,180,150,.10);--bd:rgba(0,180,150,.28);--bg:#edfaf7;--cd:#fff;--c2:#f4faf8;--tx:#0c2822;--mu:#6b9990;--dm:#b0cfc9;--re:#e05050;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);--sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px)}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;color:var(--tx);-webkit-font-smoothing:antialiased}
.hdr{background:linear-gradient(120deg,#00c9a7,#00b496 55%,#008f78);padding:calc(12px + var(--st)) 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,140,100,.28)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-l span{color:#fff;font-size:16px;font-weight:800}
.logo{width:34px;height:34px;border-radius:9px;border:2px solid rgba(255,255,255,.35);background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.bdg{background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.cok{background:#4ade80}.cerr{background:var(--re);animation:bl 1s infinite}.cload{background:#fbbf24;animation:bl .5s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:grid;grid-template-columns:1fr 1fr}
.tab{padding:10px;text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);border:none;background:transparent;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;transition:all .15s;-webkit-appearance:none}
.tab.on{color:#fff;border-bottom-color:#fff}
.tbdg{display:inline-block;background:rgba(255,255,255,.25);border-radius:20px;padding:1px 7px;font-size:10px;margin-left:4px}
.tab.on .tbdg{background:rgba(255,255,255,.4)}
.wrap{max-width:680px;margin:0 auto;padding:14px 12px calc(40px + var(--sb));padding-left:calc(12px + var(--sl));padding-right:calc(12px + var(--sr))}
.card{background:var(--cd);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,140,110,.08)}
.ct{font-size:10px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;display:block}
.lbl{display:block;font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.sr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.btn{display:flex;align-items:center;justify-content:center;padding:13px 16px;border-radius:11px;border:none;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;touch-action:manipulation;-webkit-appearance:none;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.96)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.bt{background:linear-gradient(135deg,var(--t),var(--t2));color:#fff}
.br{background:var(--re);color:#fff}
.bg{background:var(--c2);color:var(--t2);border:1.5px solid var(--bd)}
.b2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn.loading{pointer-events:none;opacity:.7}
.btn.loading::after{content:'';display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;margin-left:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.inp{width:100%;padding:11px 13px;background:var(--c2);border:1.5px solid var(--bd);border-radius:9px;font-size:15px;font-family:inherit;color:var(--tx);outline:none;-webkit-appearance:none;transition:border .2s}
.inp:focus{border-color:var(--t);background:#fff;box-shadow:0 0 0 3px rgba(0,180,150,.09)}
.inp::placeholder{color:var(--dm)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:440px){.row2,.row3{grid-template-columns:1fr}}
.cnt-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.cbtn{padding:11px 6px;border-radius:9px;border:1.5px solid var(--bd);background:var(--c2);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;color:var(--mu);text-align:center;-webkit-appearance:none;transition:all .15s;touch-action:manipulation}
.cbtn:active{transform:scale(.95)}.cbtn.sel{background:var(--lt);border-color:var(--t);color:var(--t2)}
.vc-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.vc-lbl{font-size:13px;color:var(--mu);font-weight:600;white-space:nowrap}
.vc-n{min-width:32px;text-align:center;font-size:22px;font-weight:800;color:var(--t2)}
.vc-hint{font-size:11px;color:var(--dm)}
.vcbtn{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--bd);background:var(--c2);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);-webkit-appearance:none;transition:all .12s;touch-action:manipulation;flex-shrink:0}
.vcbtn:active{transform:scale(.9)}.vcbtn:disabled{opacity:.3;cursor:not-allowed}
.ng{display:grid;gap:10px;margin-bottom:12px}.ng.g2{grid-template-columns:1fr 1fr}
@media(max-width:440px){.ng.g2{grid-template-columns:1fr}}
.fld label{display:block;font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.fld input{width:100%;padding:11px 13px;background:var(--c2);border:1.5px solid var(--bd);border-radius:9px;font-size:15px;font-family:inherit;color:var(--tx);outline:none;-webkit-appearance:none;transition:border .2s}
.fld input:focus{border-color:var(--t);background:#fff;box-shadow:0 0 0 3px rgba(0,180,150,.09)}
.fld input::placeholder{color:var(--dm)}
.spill{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700}
.slive{background:var(--lt);color:var(--t2);border:1px solid var(--bd)}
.sidle{background:#f0f0ee;color:var(--mu);border:1px solid #dde}
.sdot{width:6px;height:6px;border-radius:50%}
.sdot-l{background:var(--t);animation:bl 1s infinite}.sdot-i{background:var(--dm)}
.info-box{background:var(--lt);border:1px solid var(--bd);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--t2);font-weight:600;margin-bottom:12px;line-height:1.7}
.rtot{text-align:center;font-size:12px;color:var(--mu);margin-bottom:12px}
.ri{margin-bottom:10px}
.rh{display:flex;justify-content:space-between;margin-bottom:5px}
.rn{font-size:13px;font-weight:700}.rv{font-size:12px;color:var(--mu)}
.rtr{height:10px;background:#e0f0ed;border-radius:10px;overflow:hidden}
.rb{height:100%;border-radius:10px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.wbox{background:linear-gradient(120deg,rgba(212,160,23,.1),rgba(212,160,23,.04));border:1px solid rgba(212,160,23,.3);border-radius:14px;padding:14px;text-align:center;display:none;margin-bottom:10px}
.wbox .cr{font-size:2rem;margin-bottom:4px}.wbox h3{font-size:.95rem;font-weight:800;color:#b8860b}.wbox p{font-size:12px;color:var(--mu);margin-top:3px}
hr.dv{border:none;border-top:1px solid rgba(0,180,150,.15);margin:10px 0}
.jg{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:7px;margin-top:8px}
.jc{padding:8px 10px;border-radius:10px;font-size:12px;font-weight:700;text-align:center;border:1.5px solid var(--bd);background:var(--c2)}
.jc.voted{background:var(--lt);border-color:var(--t);color:var(--t2)}
.jc.waiting{color:var(--mu);border-color:#dde}
.jc .sub{display:block;font-size:10px;font-weight:500;margin-top:2px;opacity:.8}
.em{font-size:12px;color:var(--dm);padding:4px 0}
.jhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.rbtn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--c2);font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;color:var(--mu);-webkit-appearance:none;touch-action:manipulation}
.rbtn:active{transform:scale(.95)}
.toast{position:fixed;bottom:calc(24px + var(--sb));left:50%;transform:translateX(-50%);background:var(--t3);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,80,60,.35)}
.score-info{font-size:11px;color:var(--t2);background:var(--lt);border-radius:8px;padding:6px 10px;margin-top:6px;font-weight:600}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-l"><div class="logo">🏆</div><span>DREAM 관리자</span></div>
    <div class="bdg" id="hbadge"><span class="cdot cload" id="cdot"></span>연결 중...</div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-pw" onclick="switchTab('pw')">🔐 사전신청<span class="tbdg" id="tb-pw">●</span></button>
    <button class="tab" id="tab-open" onclick="switchTab('open')">🎤 현장투표<span class="tbdg" id="tb-open">●</span></button>
  </div>
</div>
<div class="wrap">

  <div class="card">
    <span class="ct">입장 설정 <span id="tab-lbl" style="font-size:10px;color:var(--mu);font-weight:600;text-transform:none;letter-spacing:0">(사전신청)</span></span>
    <div class="row2">
      <div><label class="lbl">비밀번호</label><input type="text" id="cfg-pw" class="inp" maxlength="20" autocomplete="off" placeholder="심사위원 입장 비번"></div>
      <div><label class="lbl">최대 인원</label><input type="number" id="cfg-max" class="inp" min="1" max="500" placeholder="20"></div>
    </div>
    <button class="btn bt" id="btn-cfg" onclick="saveCfg()">저장하기</button>
  </div>

  <div class="card">
    <span class="ct">점수 가중치 설정</span>
    <div class="row3">
      <div><label class="lbl">총 배점</label><input type="number" id="w-total" class="inp" min="1" placeholder="50" value="50"></div>
      <div><label class="lbl" id="w-n-lbl">투표 인원 수</label><input type="number" id="w-n" class="inp" min="1" placeholder="30" value="30"></div>
      <div><label class="lbl">1인당 점수</label><input type="number" id="w-per" class="inp" readonly style="background:#e8f5f0;color:var(--t2);font-weight:800"></div>
    </div>
    <div class="score-info" id="score-info">계산 결과가 여기 표시됩니다</div>
    <button class="btn bg" style="margin-top:10px" onclick="saveWeight()">가중치 저장</button>
  </div>

  <div class="card">
    <div class="sr">
      <span class="ct" style="margin:0">투표 설정 &amp; 제어</span>
      <span class="spill sidle" id="spill"><span class="sdot sdot-i" id="sdot"></span><span id="stxt">대기 중</span></span>
    </div>
    <span class="lbl">참가자 수</span>
    <div class="cnt-row">
      <button class="cbtn" id="cb2" onclick="setCount(2)">2명</button>
      <button class="cbtn" id="cb4" onclick="setCount(4)">4명</button>
      <button class="cbtn" id="cb6" onclick="setCount(6)">6명</button>
      <button class="cbtn" id="cb8" onclick="setCount(8)">8명</button>
    </div>
    <div id="ng" class="ng g2"></div>
    <span class="lbl">인당 투표 수</span>
    <div class="vc-row">
      <span class="vc-lbl">선택 가능 인원:</span>
      <button class="vcbtn" id="vc-m" onclick="chgV(-1)">−</button>
      <span class="vc-n" id="vc-n">1</span>
      <button class="vcbtn" id="vc-p" onclick="chgV(1)">+</button>
      <span class="vc-hint" id="vc-hint"></span>
    </div>
    <button class="btn bg" id="btn-save" style="margin-bottom:10px" onclick="saveNames()">이름 저장</button>
    <div class="b2">
      <button class="btn bt" id="btn-open" onclick="openVote()">▶ 투표 열기</button>
      <button class="btn br" id="btn-close" style="display:none" onclick="closeVote()">⏹ 투표 닫기</button>
      <button class="btn br" id="btn-clear" onclick="clearVote()">✕ 초기화</button>
    </div>
  </div>

  <div class="card">
    <span class="ct">실시간 결과</span>
    <div class="wbox" id="wbox"><div class="cr">🏆</div><h3 id="wn">—</h3><p id="ws">—</p></div>
    <div class="rtot" id="rtot">총 0표</div>
    <div id="rbars"></div>
    <hr class="dv">
    <div class="jhead">
      <span class="ct" style="margin:0">접속 심사위원 <span id="jcnt" style="font-size:11px;color:var(--mu);font-weight:400;text-transform:none;letter-spacing:0">(0명)</span></span>
      <button class="rbtn" onclick="resetJudges()">목록 초기화</button>
    </div>
    <div id="jj" class="jg"><span class="em">아직 없음</span></div>
    <hr class="dv">
    <span class="ct">투표 현황</span>
    <div id="jv" class="jg"><span class="em">투표 시작 후 표시</span></div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
var DBS={pw:'https://dream-vote-e947f-default-rtdb.asia-southeast1.firebasedatabase.app/vote_pw.json',open:'https://dream-vote-e947f-default-rtdb.asia-southeast1.firebasedatabase.app/vote_open.json'};
var curTab='pw';
function getDB(){return DBS[curTab];}

var _c={pw:null,open:null},poll=null,_h={pw:'',open:''},_busy=false,_errs=0, isPolling=false;
var lCnt={pw:2,open:2},lVc={pw:1,open:1};
var wt={pw:{total:50,n:30},open:{total:50,n:0}};
var BARS=['linear-gradient(90deg,#00b496,#7de8d8)','linear-gradient(90deg,#3b82f6,#93c5fd)','linear-gradient(90deg,#f59e0b,#fcd34d)','linear-gradient(90deg,#ef4444,#fca5a5)','linear-gradient(90deg,#8b5cf6,#c4b5fd)','linear-gradient(90deg,#10b981,#6ee7b7)','linear-gradient(90deg,#ec4899,#fbcfe8)','linear-gradient(90deg,#6366f1,#a5b4fc)'];

function switchTab(t){
  curTab=t;
  document.getElementById('tab-pw').className='tab'+(t==='pw'?' on':'');
  document.getElementById('tab-open').className='tab'+(t==='open'?' on':'');
  document.getElementById('tab-lbl').textContent=t==='pw'?'(사전신청)':'(현장)';
  
  var w=wt[t];
  document.getElementById('w-total').value=w.total;
  if(t==='pw'){
    document.getElementById('w-n-lbl').textContent='투표 인원 수';
    document.getElementById('w-n').value=w.n||30;
    document.getElementById('w-n').readOnly=false;
    document.getElementById('w-n').style.background='';
  }else{
    document.getElementById('w-n-lbl').textContent='실투표자 수 (자동)';
    var s=_c.open;
    var actualN=s?Object.keys(s.judgeVoted||{}).length:0;
    document.getElementById('w-n').value=actualN||'(투표 후 자동)';
    document.getElementById('w-n').readOnly=true;
    document.getElementById('w-n').style.background='#e8f5f0';
  }
  
  var s=_c[t];
  if(s){
    setCount(parseInt(s.roundCount)||2);
    lVc[t]=parseInt(s.roundVotes)||1;
    updVc();
    for(var i=1;i<=lCnt[t];i++){var el=document.getElementById('n'+i);if(el&&s['name'+i])el.value=s['name'+i];}
    renderUI(s);
  }
  calcWeight();
}

function calcWeight(){
  var total=parseFloat(document.getElementById('w-total').value)||50;
  var nVal;
  if(curTab==='open'){
    var s=_c.open;
    nVal=s?Object.keys(s.judgeVoted||{}).length:0;
  }else{
    nVal=parseFloat(document.getElementById('w-n').value)||30;
  }
  var per=nVal>0?(total/nVal):0;
  document.getElementById('w-per').value=per>0?per.toFixed(3):'—';
  var info=curTab==='pw'
    ?('사전신청: '+total+'점 ÷ '+nVal+'명 = 1인당 '+per.toFixed(3)+'점')
    :('현장투표: '+total+'점 ÷ 실투표자 수 = 1인당 점수 (투표 마감 후 확정)');
  document.getElementById('score-info').textContent=info;
  wt[curTab].total=total;
  if(curTab==='pw')wt[curTab].n=nVal;
}

function saveWeight(){
  calcWeight();
  var w=wt[curTab];
  var p={weightTotal:w.total};
  if(curTab==='pw')p.weightN=w.n;
  dbPatch(p).then(function(){toast('가중치 저장 ✓');}).catch(function(e){toast('오류: '+e.message);});
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('w-total').addEventListener('input',calcWeight);
  document.getElementById('w-n').addEventListener('input',calcWeight);
});

function dbRead(tab){
  var target = tab || curTab;
  return fetch(DBS[target]+'?t='+Date.now(),{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(s){if(!s||typeof s!=='object')s={};_c[target]=s;return s;});
}
function dbPatch(p){
  var db=getDB();
  return fetch(db,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
}
function mkH(s){
  if(!s)return'';
  var n={};for(var i=1;i<=8;i++)n[i]=s['name'+i]||'';
  return JSON.stringify({o:s.isOpen,v:s.votes,jv:s.judgeVoted,jj:s.judgeJoined,r:s.round,cnt:s.roundCount,vc:s.roundVotes,n:n,wt:s.weightTotal,wn:s.weightN,pw:s.pw,mj:s.maxJudge});
}

function startPoll(){
  if(isPolling) return;
  isPolling = true;
  function run(){
    if(_busy){ setTimeout(run,1000); return; }
    // 두 탭 모두 폴링 — 현장투표 실시간 반영
    Promise.all([dbRead('pw'),dbRead('open')]).then(function(res){
      _errs=0; document.getElementById('cdot').className='cdot cok';
      var s=res[curTab==='pw'?0:1];
      var h=mkH(s); if(h!==_h[curTab]){ _h[curTab]=h; renderUI(s); }
      updTBadge('pw',_c.pw); updTBadge('open',_c.open);
      setTimeout(run,1500);
    }).catch(function(){
      _errs++; if(_errs>=3) document.getElementById('cdot').className='cdot cerr';
      setTimeout(run,2000);
    });
  }
  run();
}

function updTBadge(t,s){
  var el=document.getElementById('tb-'+t);if(!el||!s)return;
  el.textContent=s.isOpen?'🔴':'●';
}
function setCount(n){
  lCnt[curTab]=n;
  [2,4,6,8].forEach(function(k){
    var el=document.getElementById('cb'+k);
    if(el)el.className='cbtn'+(k===n?' sel':'');
  });
  var g=document.getElementById('ng');g.innerHTML='';g.className='ng g2';
  for(var i=1;i<=n;i++){
    var d=document.createElement('div');d.className='fld';
    d.innerHTML='<label>참가자 '+i+'</label><input type="text" id="n'+i+'" placeholder="이름 입력" autocomplete="off">';
    g.appendChild(d);
  }
  if(lVc[curTab]>=n)lVc[curTab]=Math.max(1,n-1);
  updVc();
  var s=_c[curTab];
  if(s)for(var j=1;j<=n;j++){var el=document.getElementById('n'+j);if(el&&s['name'+j])el.value=s['name'+j];}
}
function chgV(d){var v=lVc[curTab]+d;if(v<1||v>=lCnt[curTab])return;lVc[curTab]=v;updVc();}
function updVc(){
  var v=lVc[curTab],n=lCnt[curTab];
  document.getElementById('vc-n').textContent=v;
  document.getElementById('vc-m').disabled=(v<=1);
  document.getElementById('vc-p').disabled=(v>=n-1);
  document.getElementById('vc-hint').textContent='(최대 '+(n-1)+'표)';
}
function setBL(id,on){var el=document.getElementById(id);if(!el)return;if(on){el.classList.add('loading');el.disabled=true;}else{el.classList.remove('loading');el.disabled=false;}}
function toast(m){var el=document.getElementById('toast');el.textContent=m;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(function(){el.style.opacity='0';},2400);}
function saveCfg(){
  var pw=document.getElementById('cfg-pw').value.trim();
  var mx=parseInt(document.getElementById('cfg-max').value)||20;
  if(!pw){toast('비밀번호를 입력하세요');return;}
  setBL('btn-cfg',true);
  dbPatch({pw:pw,maxJudge:mx}).then(function(){toast('저장됨 ✓');}).catch(function(e){toast('오류: '+e.message);}).finally(function(){setBL('btn-cfg',false);});
}
function saveNames(){
  var cnt=lCnt[curTab],vc=lVc[curTab];
  var p={roundCount:cnt,roundVotes:vc};
  for(var i=1;i<=cnt;i++){var el=document.getElementById('n'+i);if(!el||!el.value.trim()){toast('참가자 '+i+' 이름을 입력하세요');return;}p['name'+i]=el.value.trim();}
  for(var m=cnt+1;m<=8;m++)p['name'+m]=null;
  setBL('btn-save',true);
  dbPatch(p).then(function(){toast('이름 저장 ✓');}).catch(function(e){toast('오류: '+e.message);}).finally(function(){setBL('btn-save',false);});
}
function openVote(){
  var s=_c[curTab];if(s&&s.isOpen){toast('이미 투표 중');return;}
  var cnt=lCnt[curTab],vc=lVc[curTab];
  for(var i=1;i<=cnt;i++){var el=document.getElementById('n'+i);if(!el||!el.value.trim()){toast('참가자 '+i+' 이름을 입력하세요');return;}}
  var votes={};for(var j=1;j<=cnt;j++)votes[String(j)]=0;
  var p={isOpen:true,judgeVoted:{},votes:votes,round:((s&&parseInt(s.round))||0)+1,roundCount:cnt,roundVotes:vc};
  for(var k=1;k<=cnt;k++)p['name'+k]=document.getElementById('n'+k).value.trim();
  for(var m=cnt+1;m<=8;m++)p['name'+m]=null;
  _busy=true; setBL('btn-open',true);
  dbPatch(p).then(function(){toast('투표 시작! ▶'); _h[curTab]=mkH(_c[curTab]); }).catch(function(e){toast('오류: '+e.message);}).finally(function(){_busy=false;setBL('btn-open',false);});
}
function closeVote(){
  _busy=true; setBL('btn-close',true);
  dbPatch({isOpen:false}).then(function(){toast('투표 닫힘 ⏹'); _h[curTab]=mkH(_c[curTab]); }).catch(function(e){toast('오류: '+e.message);}).finally(function(){_busy=false;setBL('btn-close',false);});
}
function clearVote(){
  if(!confirm('투표를 초기화하시겠습니까?'))return;
  var s=_c[curTab];var cnt=(s&&s.roundCount)||lCnt[curTab];
  var votes={};for(var i=1;i<=cnt;i++)votes[String(i)]=0;
  _busy=true;setBL('btn-clear',true);
  dbPatch({isOpen:false,votes:votes,judgeVoted:{}}).then(function(){toast('초기화 완료');_h[curTab]=mkH(_c[curTab]);}).catch(function(e){toast('오류: '+e.message);}).finally(function(){_busy=false;setBL('btn-clear',false);});
}
function resetJudges(){
  if(!confirm('심사위원 목록을 초기화하시겠습니까?'))return;
  _busy=true;
  dbPatch({judgeJoined:[],judgeVoted:{}}).then(function(){toast('목록 초기화 완료'); _h[curTab]=mkH(_c[curTab]); dbRead().then(renderUI); }).catch(function(e){toast('오류: '+e.message);}).finally(function(){_busy=false;});
}
function renderUI(s){
  if(!s)return;_c[curTab]=s;
  var cnt=parseInt(s.roundCount)||lCnt[curTab];
  var vc=parseInt(s.roundVotes)||lVc[curTab];
  var ac=document.activeElement;
  
  if(ac!==document.getElementById('cfg-pw'))document.getElementById('cfg-pw').value=s.pw||'';
  if(ac!==document.getElementById('cfg-max'))document.getElementById('cfg-max').value=s.maxJudge||20;
  
  if(s.weightTotal){
    wt[curTab].total=s.weightTotal;
    if(ac!==document.getElementById('w-total'))document.getElementById('w-total').value=s.weightTotal;
  }
  if(curTab==='pw'&&s.weightN){
    wt[curTab].n=s.weightN;
    if(ac!==document.getElementById('w-n'))document.getElementById('w-n').value=s.weightN;
  }
  
  if(!_busy){
    if(cnt!==lCnt[curTab])setCount(cnt);
    if(vc!==lVc[curTab]){lVc[curTab]=vc;updVc();}
    for(var i=1;i<=cnt;i++){var el=document.getElementById('n'+i);if(el&&ac!==el)el.value=s['name'+i]||'';}
  }
  
  // 현장평가단: judgeVoted 기준으로 실투표자 수 실시간 반영
  var actualN = Object.keys(s.judgeVoted||{}).length;
  if(curTab==='open'){
    wt.open.n = actualN;
    var wNInput = document.getElementById('w-n');
    if(ac !== wNInput){
      wNInput.value = actualN > 0 ? actualN : '(투표 후 자동)';
    }
    // score-info 레이블도 즉시 갱신
    var total = parseFloat(document.getElementById('w-total').value)||50;
    var per = actualN > 0 ? (total / actualN) : 0;
    document.getElementById('w-per').value = per > 0 ? per.toFixed(3) : '—';
    document.getElementById('score-info').textContent =
      actualN > 0
        ? ('현장투표: '+total+'점 ÷ '+actualN+'명 = 1인당 '+per.toFixed(3)+'점')
        : '현장투표: '+total+'점 ÷ 실투표자 수 = 1인당 점수 (투표 마감 후 확정)';
  } else {
    calcWeight();
  }

  var votes = s.votes||{}, tot = 0;
  for(var k in votes) tot += parseInt(votes[k])||0;
  var w = wt[curTab];
  // open 탭은 방금 업데이트된 actualN 사용, pw 탭은 저장된 n 사용
  var effectiveN = (curTab==='open') ? actualN : w.n;
  var perScore = effectiveN > 0 ? (w.total / effectiveN) : 0;

  var scoreLabel = (curTab==='open' && effectiveN === 0) ? ' | (투표 마감 후 점수 확정)' : '';
  document.getElementById('rtot').textContent = '총 '+tot+'표'+scoreLabel+' · 1인='+perScore.toFixed(2)+'점';
  
  var bars=document.getElementById('rbars');bars.innerHTML='';
  var maxV=0;
  for(var idx=1;idx<=cnt;idx++){var vv=parseInt(votes[String(idx)])||0;if(vv>maxV)maxV=vv;}
  for(var idx=1;idx<=cnt;idx++){
    var nm=s['name'+idx]||'참가자 '+idx;
    var v=parseInt(votes[String(idx)])||0;
    var sc=(v*perScore).toFixed(2);
    var pct=maxV?Math.round(v/maxV*100):0;
    var el2=document.createElement('div');el2.className='ri';
    el2.innerHTML='<div class="rh"><span class="rn">'+nm+'</span><span class="rv">'+v+'표 · '+sc+'점</span></div>'
      +'<div class="rtr"><div class="rb" style="width:'+pct+'%;background:'+BARS[(idx-1)%BARS.length]+'"></div></div>';
    bars.appendChild(el2);
  }
  
  var wb=document.getElementById('wbox');
  if(!s.isOpen&&tot>0){
    wb.style.display='block';
    var arr=[];
    for(var si=1;si<=cnt;si++){
      var vsi=parseInt(votes[String(si)])||0;
      arr.push({n:s['name'+si]||'참가자 '+si,v:vsi,sc:(vsi*perScore).toFixed(2)});
    }
    arr.sort(function(a,b){return b.v-a.v;});
    var top=arr.slice(0,vc);
    document.getElementById('wn').textContent='🏆 '+top.map(function(x){return x.n;}).join(', ');
    document.getElementById('ws').textContent=top.map(function(x){return x.v+'표 ('+x.sc+'점)';}).join(' / ');
  }else{wb.style.display='none';}
  
  if(s.isOpen){
    document.getElementById('spill').className='spill slive';document.getElementById('sdot').className='sdot sdot-l';document.getElementById('stxt').textContent='투표 진행 중';
    document.getElementById('hbadge').innerHTML='<span class="cdot cok" id="cdot"></span>🔴 투표 중';
    document.getElementById('btn-open').style.display='none';document.getElementById('btn-close').style.display='';document.getElementById('btn-clear').style.display='none';
  }else{
    document.getElementById('spill').className='spill sidle';document.getElementById('sdot').className='sdot sdot-i';document.getElementById('stxt').textContent='대기 중';
    document.getElementById('hbadge').innerHTML='<span class="cdot cok" id="cdot"></span>⏸ 대기 중';
    document.getElementById('btn-open').style.display='';document.getElementById('btn-close').style.display='none';document.getElementById('btn-clear').style.display='';
  }
  
  var joined=(s.judgeJoined && typeof s.judgeJoined === 'object') ? Object.values(s.judgeJoined) : [];
  var jv=(s.judgeVoted&&typeof s.judgeVoted==='object')?s.judgeVoted:{};
  document.getElementById('jcnt').textContent='('+joined.length+'명)';
  document.getElementById('jj').innerHTML=joined.length
    ?joined.map(function(nm){var done=jv[nm];return'<div class="jc '+(done?'voted':'waiting')+'">'+nm+'<span class="sub">'+(done?'✓ 투표':'대기')+'</span></div>';}).join('')
    :'<span class="em">아직 없음</span>';
  
  var jvK=Object.keys(jv);
  document.getElementById('jv').innerHTML=jvK.length
    ?jvK.map(function(judge){
        var ch=jv[judge];
        var names=Array.isArray(ch)?ch.map(function(c){return s['name'+c]||'참가자 '+c;}).join(', '):(s['name'+ch]||'참가자 '+ch);
        return'<div class="jc voted">'+judge+'<span class="sub">'+names+'</span></div>';
      }).join('')
    :(s.isOpen?'<span class="em">아직 투표 없음</span>':'<span class="em">투표 시작 후 표시</span>');
}

setCount(2);updVc();
Promise.all([dbRead('pw'), dbRead('open')]).then(function(res){
  var s=res[0], s2=res[1];
  _h.pw=mkH(s); _h.open=mkH(s2);
  switchTab('pw');
  startPoll();
}).catch(function(e){
  toast('연결 오류: '+e.message);
  document.getElementById('cdot').className='cdot cerr';
});

document.addEventListener('visibilitychange',function(){
  if(!document.hidden){dbRead().then(function(s){var h=mkH(s);if(h!==_h[curTab]){_h[curTab]=h;renderUI(s);}}).catch(function(){});}
});
</script>
</body>
</html>
